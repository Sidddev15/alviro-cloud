version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: alviro-postgres
    restart: always
    environment:
      POSTGRES_USER: alviro
      POSTGRES_PASSWORD: alviro
      POSTGRES_DB: alviro_cloud
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
